name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync
      - name: Cache prek
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek/
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run prek
        run: uvx prek run --all-files --show-diff-on-failure --color=always

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest -v
