[project]
name = "gli4py"
version = "0.0.17b3"
description = "A Python 3 async API wrapper for GL.iNet routers (used by the Home Assistant integration)"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
authors = [{ name = "HarvsG", email = "doctor@codingdoctor.co.uk" }]
# Runtime dependencies.
dependencies = [
    "uplink>=0.10.0",
    "libpass>=1.8.0",
    "semver>=3.0.0",
    "aiohttp>=3.8.4",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/HarvsG/gli4py"

[dependency-groups]
dev = [
    "pytest>=7.2",
    "pytest-asyncio>=0.21",
    "python-dotenv>=1.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gli4py"]

[tool.hatch.build.targets.wheel.force-include]
"gli4py/py.typed" = "gli4py/py.typed"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]
